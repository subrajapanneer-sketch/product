<!DOCTYPE html>
<html>
<head>
    <title>Grocery Shop Bill</title>
    <style>
        body{
            font-family: algerian;
            background:#4916d8;
            text-align:center;
        }

        .container{
            width:400px;
            margin:50px auto;
            background:rgb(180, 139, 139);
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input{
            width:90%;
            padding:10px;
            margin:8px;
        }

    button{
    width:100%;
    padding:12px;
    background:#17bd17
    color #0abbbb
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:all 0.3s ease;
}

button:hover{
    background:#219150;
    transform:translateY(-3px);
    box-shadow:0 8px 15px rgba(0,0,0,0.2);
}

        #bill{
            margin-top:20px;
            text-align:left;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Grocery Shop Bill Calculator</h2>

    <input type="text" id="pname" placeholder="Product Name"><br>

    <input type="number" id="qty" placeholder="Quantity"><br>

    <input type="number" id="price" placeholder="Price per Item"><br>

    <input type="number" id="tax" placeholder="Tax %"><br>

    <button onclick="calculateBill()">Generate Bill</button>

    <div id="bill"></div>
</div>

<script>
function calculateBill(){

    let product =
        document.getElementById("pname").value;

    let qty =
        Number(document.getElementById("qty").value);

    let price =
        Number(document.getElementById("price").value);

    let tax =
        Number(document.getElementById("tax").value);

    let amount = qty * price;
    let taxAmount = amount * tax / 100;
    let total = amount + taxAmount;

    document.getElementById("bill").innerHTML =
        "<h3>Bill Details</h3>" +
        "Product: " + product + "<br>" +
        "Quantity: " + qty + "<br>" +
        "Price: ₹" + price + "<br>" +
        "Amount: ₹" + amount + "<br>" +
        "Tax: ₹" + taxAmount.toFixed(2) + "<br>" +
        "<b>Total Amount: ₹" + total.toFixed(2) + "</b>";
}
</script>

</body>
</html>
